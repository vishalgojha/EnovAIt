services:
  enovait-api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://enov360.com}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-EnovAIt}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AI_RETRY_ATTEMPTS: ${AI_RETRY_ATTEMPTS:-3}
      AI_RETRY_BASE_MS: ${AI_RETRY_BASE_MS:-400}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-240}
      RATE_LIMIT_TENANT_DEFAULT_MAX: ${RATE_LIMIT_TENANT_DEFAULT_MAX:-120}
      RATE_LIMIT_TENANT_OVERRIDES: ${RATE_LIMIT_TENANT_OVERRIDES:-{}}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      CHANNEL_WEBHOOK_TOKEN: ${CHANNEL_WEBHOOK_TOKEN:-}
      ENABLE_SUPER_ADMIN: ${ENABLE_SUPER_ADMIN:-false}
      WHATSAPP_BAILEYS_SESSION_PATH: /data/baileys
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      WHATSAPP_META_ACCESS_TOKEN: ${WHATSAPP_META_ACCESS_TOKEN:-}
      WHATSAPP_META_PHONE_NUMBER_ID: ${WHATSAPP_META_PHONE_NUMBER_ID:-}
      WHATSAPP_META_API_VERSION: ${WHATSAPP_META_API_VERSION:-v22.0}
      WHATSAPP_META_VERIFY_TOKEN: ${WHATSAPP_META_VERIFY_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL_DEFAULT: ${SLACK_CHANNEL_DEFAULT:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      MSTEAMS_WEBHOOK_URL: ${MSTEAMS_WEBHOOK_URL:-}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_SMS_FROM: ${TWILIO_SMS_FROM:-}
      TWILIO_VOICE_FROM: ${TWILIO_VOICE_FROM:-}
      TWILIO_VOICE_TWIML_URL: ${TWILIO_VOICE_TWIML_URL:-}
      IOT_MQTT_URL: ${IOT_MQTT_URL:-}
      IOT_MQTT_USERNAME: ${IOT_MQTT_USERNAME:-}
      IOT_MQTT_PASSWORD: ${IOT_MQTT_PASSWORD:-}
      IOT_MQTT_TOPIC_DEFAULT: ${IOT_MQTT_TOPIC_DEFAULT:-enovait/sensors}
      ERP_CRM_WEBHOOK_URL: ${ERP_CRM_WEBHOOK_URL:-}
      API_PARTNER_WEBHOOK_URL: ${API_PARTNER_WEBHOOK_URL:-}
      ARCHON_BASE_URL: ${ARCHON_BASE_URL:-}
      ARCHON_API_KEY: ${ARCHON_API_KEY:-}
      ARCHON_API_TOKEN: ${ARCHON_API_TOKEN:-}
      ARCHON_TIMEOUT_MS: ${ARCHON_TIMEOUT_MS:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8080"
    volumes:
      - enovait-baileys-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  enovait-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  enovait-baileys-data: {}
