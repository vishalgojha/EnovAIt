services:
  enovait-backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      SUPABASE_URL:
      SUPABASE_ANON_KEY:
      SUPABASE_SERVICE_ROLE_KEY:
      SUPABASE_JWT_SECRET:
      GEMINI_API_KEY:
      GEMINI_MODEL:
      GROQ_API_KEY:
      GROQ_MODEL:
      AI_PROVIDER:
      OPENROUTER_API_KEY:
      OPENROUTER_MODEL:
      TRUST_PROXY:
      RATE_LIMIT_WINDOW_MS:
      RATE_LIMIT_GLOBAL_MAX:
      RATE_LIMIT_TENANT_DEFAULT_MAX:
      WHATSAPP_BAILEYS_SESSION_PATH: /data/baileys
      WHATSAPP_BAILEYS_DEFAULT_LABEL:
      LOG_LEVEL:
    expose:
      - "8080"
    volumes:
      - enovait-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  enovait-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
    expose:
      - "80"

volumes:
  enovait-data: {}
