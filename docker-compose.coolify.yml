services:
  enovait:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-240}
      RATE_LIMIT_TENANT_DEFAULT_MAX: ${RATE_LIMIT_TENANT_DEFAULT_MAX:-120}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      WHATSAPP_BAILEYS_SESSION_PATH: /data/baileys
      WHATSAPP_BAILEYS_DEFAULT_LABEL: ${WHATSAPP_BAILEYS_DEFAULT_LABEL:-primary}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8080"
    volumes:
      - enovait-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  enovait-data: {}
