name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/backend/package-lock.json

      - name: Install dependencies
        run: cd packages/backend && npm ci

      - name: Typecheck
        run: cd packages/backend && npm run typecheck

      - name: Test
        run: cd packages/backend && npm run test

      - name: Build
        run: cd packages/backend && npm run build

      - name: Production audit (critical only)
        run: cd packages/backend && npm audit --omit=dev --audit-level=critical
