name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/backend/package-lock.json

      - name: Install dependencies
        working-directory: packages/backend
        run: npm ci --include=dev --include=optional

      - name: Ensure Rollup native optional dependency (Linux)
        working-directory: packages/backend
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" >/dev/null 2>&1; then
            if node -e "require.resolve('rollup/package.json')" >/dev/null 2>&1; then
              ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
            else
              ROLLUP_VERSION=$(npm view rollup version)
              npm i --no-save rollup@$ROLLUP_VERSION
            fi
            npm i --no-save @rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION
          fi

      - name: Typecheck
        working-directory: packages/backend
        run: npm run typecheck

      - name: Test
        working-directory: packages/backend
        run: npm run test

      - name: Build
        working-directory: packages/backend
        run: npm run build

      # Skip audit due to known vulnerabilities in Baileysprotobuf/xlsx with no fix
      # - name: Production audit (critical only)
      #   working-directory: packages/backend
      #   run: npm audit --omit=dev --audit-level=critical
