name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/backend/package-lock.json

      - name: Install dependencies
        working-directory: packages/backend
        run: npm ci --include=optional

      - name: Ensure Rollup native optional dependency (Linux)
        working-directory: packages/backend
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" >/dev/null 2>&1; then
            ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
            npm i --no-save @rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION
          fi

      - name: Typecheck
        working-directory: packages/backend
        run: npm run typecheck

      - name: Test
        working-directory: packages/backend
        run: npm run test

      - name: Build
        working-directory: packages/backend
        run: npm run build

      - name: Production audit (critical only)
        working-directory: packages/backend
        run: npm audit --omit=dev --audit-level=critical
